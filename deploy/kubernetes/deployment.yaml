apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-rag
  labels:
    app: production-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: production-rag
  template:
    metadata:
      labels:
        app: production-rag
    spec:
      containers:
        - name: rag-api
          image: production-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: production-rag-config
            - secretRef:
                name: production-rag-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: chroma-data
              mountPath: /app/chroma_db
            - name: processed-data
              mountPath: /app/data
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: production-rag-chroma
        - name: processed-data
          emptyDir: {}
