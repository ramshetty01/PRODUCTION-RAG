apiVersion: v1
kind: ConfigMap
metadata:
  name: production-rag-config
data:
  RAG_ENVIRONMENT: "production"
  RAG_HOST: "0.0.0.0"
  RAG_PORT: "8000"
  RAG_VECTOR_DB_PATH: "/app/chroma_db"
  RAG_MANIFEST_PATH: "/app/data/processed/ingestion_manifest.json"
  RAG_EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  RAG_CHUNK_SIZE: "700"
  RAG_CHUNK_OVERLAP: "100"
  RAG_TOP_K: "4"
  RAG_RETRIEVAL_MODE: "semantic"
  RAG_LOG_LEVEL: "INFO"
  RAG_LLM_PROVIDER: "extractive"
  RAG_RERANKER_PROVIDER: "lexical"
  RAG_RERANKER_ALLOW_FALLBACK: "true"
