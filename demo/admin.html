<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Production RAG Admin</title>
    <link rel="stylesheet" href="/demo/styles.css">
  </head>
  <body>
    <main class="shell admin-shell">
      <section class="app-window" aria-label="Production RAG admin console">
        <div class="product-bar">
          <strong>Admin Console</strong>
          <div class="status-strip">
            <span id="adminHealth">Health</span>
            <span id="adminIndex">Index</span>
            <span id="adminFailures">Failures</span>
          </div>
        </div>
        <section class="glass-stage admin-stage">
          <div class="stage-copy">
            <p class="eyebrow">Operations</p>
            <h1>Manage local RAG</h1>
            <p class="subtitle">Inspect documents, index health, failed jobs, and run admin actions.</p>
          </div>
          <section class="auth-strip">
            <label>
              <span>Admin API key</span>
              <input id="adminCredential" type="password" autocomplete="off" placeholder="Paste admin key">
            </label>
            <button id="adminRefresh" type="button">Refresh</button>
            <span id="adminStatus" class="auth-badge">Not loaded</span>
          </section>
          <div id="adminDocuments" class="admin-table"></div>
          <section class="admin-audit">
            <div class="section-head compact">
              <div>
                <p class="panel-kicker">Audit</p>
                <h3>Recent activity</h3>
              </div>
              <a id="auditCsv" href="/audit?format=csv">Export CSV</a>
            </div>
            <div id="auditEvents" class="admin-table"></div>
          </section>
          <section class="admin-audit">
            <div class="section-head compact">
              <div>
                <p class="panel-kicker">Feedback</p>
                <h3>User ratings</h3>
              </div>
              <a id="feedbackCsv" href="/feedback/events?format=csv">Export CSV</a>
            </div>
            <div id="feedbackEvents" class="admin-table"></div>
          </section>
        </section>
      </section>
    </main>
    <script src="/demo/admin.js"></script>
  </body>
</html>
