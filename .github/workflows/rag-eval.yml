name: RAG Evaluation

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "prompts/**"
      - "configs/**"
      - "evals/**"
      - "requirements.txt"
      - ".github/workflows/rag-eval.yml"
  workflow_dispatch:

jobs:
  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/test_chunking.py tests/test_citations.py tests/test_retrieval.py tests/test_ingestion.py tests/test_evals.py

      - name: Run offline RAG evaluation
        run: |
          python evals/run_ragas.py --min-faithfulness 0.90
