name: Security Scan

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/security-scan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.7.3

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --progress-spinner off --format json --output pip-audit-report.json

      - name: Upload dependency audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  container-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan filesystem and Dockerfile
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Upload container audit report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
